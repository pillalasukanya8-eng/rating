div
span                                     
section
article  

in webpage.
<!DOCTYPE html>
<html>

<head>
    <title>HTML Tags Example</title>
</head>

<body>

    <section>

        <h1>Frontend Development</h1>

        <article>

            <h2>HTML Basics</h2>

            <p>
                HTML is used to create webpage structure.
            </p>

        </article>

    </section>

    <div>

        <h2>Student Details</h2>

        <p>
            Name:
            <span>Sukanya</span>
        </p>

    </div>

</body>

</html>
